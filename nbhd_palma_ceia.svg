  <ellipse cx="60" cy="230" rx="55" ry="70" fill="#356820"/>
  <ellipse cx="30" cy="260" rx="40" ry="55" fill="#2A5A15"/>
  <rect x="700" y="270" width="20" height="190" fill="#3A2810"/>

  <rect x="360" y="300" width="80" height="140" fill="#8B6914" opacity="0.85"/>
  <rect x="368" y="308" width="28" height="55" fill="#A8C8D8" opacity="0.6"/>
  <rect x="404" y="308" width="28" height="55" fill="#A8C8D8" opacity="0.6"/>
  <!-- Front steps -->
  <rect x="330" y="435" width="140" height="12" fill="#DDD5C0"/>
  <rect x="320" y="445" width="160" height="12" fill="#CCC4B0"/>
  <rect x="310" y="455" width="180" height="12" fill="#BBB3A0"/>

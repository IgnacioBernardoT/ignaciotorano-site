  <polygon points="240,200 270,165 300,200" fill="#B89060"/>
  <rect x="248" y="175" width="44" height="30" fill="#A8C8D8" opacity="0.7"/>
  <polygon points="500,200 530,165 560,200" fill="#B89060"/>
  <rect x="508" y="175" width="44" height="30" fill="#A8C8D8" opacity="0.7"/>
  <!-- Front columns -->
  <rect x="210" y="220" width="12" height="120" fill="#E8E0D0"/>
  <rect x="240" y="220" width="12" height="120" fill="#E8E0D0"/>
  <rect x="548" y="220" width="12" height="120" fill="#E8E0D0"/>
  <rect x="578" y="220" width="12" height="120" fill="#E8E0D0"/>
  <!-- Windows -->
  <rect x="185" y="250" width="55" height="65" fill="#A8C8D8" opacity="0.7"/>
  <rect x="270" y="250" width="55" height="65" fill="#A8C8D8" opacity="0.7"/>
  <rect x="480" y="250" width="55" height="65" fill="#A8C8D8" opacity="0.7"/>
  <rect x="565" y="250" width="55" height="65" fill="#A8C8D8" opacity="0.7"/>

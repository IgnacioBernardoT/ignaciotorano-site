<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="watersky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a4a7a"/>
      <stop offset="45%" stop-color="#2E86C1"/>
      <stop offset="46%" stop-color="#1a6a9a"/>
      <stop offset="100%" stop-color="#0d4a7a"/>
    </linearGradient>
    <linearGradient id="sunset" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6B35" opacity="0.4"/>
      <stop offset="50%" stop-color="#FFD700" opacity="0.3"/>
      <stop offset="100%" stop-color="#FF6B35" opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Sky to water -->
  <rect width="800" height="600" fill="url(#watersky)"/>
  <!-- Sunset glow -->
  <rect width="800" height="600" fill="url(#sunset)"/>
  <!-- Sun reflection on water -->
  <ellipse cx="400" cy="350" rx="120" ry="15" fill="#FFD700" opacity="0.3"/>
  <!-- Water ripples -->
  <ellipse cx="400" cy="370" rx="200" ry="8" fill="none" stroke="#87CEEB" stroke-width="1" opacity="0.3"/>
  <ellipse cx="400" cy="390" rx="280" ry="10" fill="none" stroke="#87CEEB" stroke-width="1" opacity="0.2"/>
  <ellipse cx="400" cy="410" rx="350" ry="12" fill="none" stroke="#87CEEB" stroke-width="1" opacity="0.15"/>
  <!-- Distant city skyline -->
  <rect x="50" y="260" width="30" height="80" fill="#1a3a5a" opacity="0.7"/>
  <rect x="85" y="240" width="25" height="100" fill="#1a3a5a" opacity="0.7"/>
  <rect x="115" y="255" width="20" height="85" fill="#1a3a5a" opacity="0.6"/>
  <rect x="600" y="255" width="35" height="85" fill="#1a3a5a" opacity="0.6"/>
  <rect x="640" y="235" width="28" height="105" fill="#1a3a5a" opacity="0.7"/>
  <rect x="673" y="250" width="22" height="90" fill="#1a3a5a" opacity="0.6"/>
  <rect x="700" y="265" width="40" height="75" fill="#1a3a5a" opacity="0.5"/>
  <!-- Island land mass -->
  <ellipse cx="400" cy="310" rx="320" ry="40" fill="#2D5A1B" opacity="0.9"/>
  <!-- Palm trees on island -->
  <rect x="280" y="235" width="6" height="75" fill="#4A3728"/>
  <ellipse cx="283" cy="225" rx="25" ry="12" fill="#2D7A1B" transform="rotate(-20,283,225)"/>
  <ellipse cx="283" cy="225" rx="25" ry="12" fill="#2D7A1B" transform="rotate(20,283,225)"/>
  <ellipse cx="283" cy="228" rx="20" ry="10" fill="#3A8A23" transform="rotate(-50,283,228)"/>
  <rect x="400" y="225" width="6" height="85" fill="#4A3728"/>
  <ellipse cx="403" cy="215" rx="25" ry="12" fill="#2D7A1B" transform="rotate(-15,403,215)"/>
  <ellipse cx="403" cy="215" rx="25" ry="12" fill="#2D7A1B" transform="rotate(25,403,215)"/>
  <rect x="510" y="240" width="6" height="70" fill="#4A3728"/>
  <ellipse cx="513" cy="230" rx="25" ry="12" fill="#2D7A1B" transform="rotate(-20,513,230)"/>
  <ellipse cx="513" cy="230" rx="25" ry="12" fill="#2D7A1B" transform="rotate(15,513,230)"/>
  <!-- Dock -->
  <rect x="370" y="305" width="10" height="60" fill="#8B6914" opacity="0.8"/>
  <rect x="355" y="305" width="40" height="5" fill="#8B6914" opacity="0.8"/>
  <!-- Sailboat -->
  <rect x="580" y="300" width="4" height="50" fill="#fff" opacity="0.8"/>
  <polygon points="584,300 584,340 610,340" fill="#fff" opacity="0.7"/>
  <rect x="568" y="345" width="30" height="8" fill="#8B6914" opacity="0.8"/>
  <!-- Dark overlay -->
  <rect width="800" height="600" fill="rgba(10,25,50,0.3)"/>
</svg>

[functions]
directory = "netlify/functions"
  [functions.emails]
  included_files = [
    "./emails/**",
    "./emails/**",
    "./emails/**"
  ]
[[headers]]
for = "/*"
  [headers.values]
  X-Frame-Options = "DENY"
  X-XSS-Protection = "1; mode=block"
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"
[[headers]]
for = "/*.html"
  [headers.values]
  Cache-Control = "public, max-age=3600, must-revalidate"
[[headers]]
for = "/sitemap.xml"
  [headers.values]
  Cache-Control = "public, max-age=86400"
  Content-Type = "application/xml"
[[redirects]]
from = "/blog/tampa-dog-rescue"
to = "/blog/tampa-dog-rescue/"
status = 301
[[redirects]]
from = "/api/google-reviews"
to = "/.netlify/functions/google-reviews"
status = 200
[[redirects]]
from = "/parks"
to = "/parks.html"
status = 200
[[redirects]]
from = "/parks/"
to = "/parks.html"
status = 200
[[redirects]]
from = "/resources/trusted-partners"
to = "/resources/trusted-partners.html"
status = 200
[[redirects]]
from = "/resources/trusted-partners/"
to = "/resources/trusted-partners.html"
status = 200
[[redirects]]
from = "/trusted-partners"
to = "/resources/trusted-partners"
status = 301
[context]
  [context.production]
    [context.production.functions]
      [context.production.functions.emails]
      included_files = [
        "./emails/**",
        "./emails/**",
        "./emails/**"
      ]
  [context.master]
    [context.master.functions]
      [context.master.functions.emails]
      included_files = [
        "./emails/**",
        "./emails/**",
        "./emails/**"
      ]

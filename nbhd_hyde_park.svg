<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="60%" stop-color="#B8D4E8"/>
      <stop offset="100%" stop-color="#D4E8C2"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#888"/>
      <stop offset="100%" stop-color="#666"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="600" fill="url(#sky)"/>
  <!-- Sun glow -->
  <circle cx="650" cy="100" r="60" fill="#FFF9E6" opacity="0.6"/>
  <!-- Trees left -->
  <rect x="30" y="200" width="18" height="200" fill="#4A3728"/>
  <ellipse cx="39" cy="180" rx="45" ry="80" fill="#2D5A1B"/>
  <ellipse cx="39" cy="160" rx="35" ry="60" fill="#3A7023"/>
  <rect x="100" y="220" width="15" height="180" fill="#4A3728"/>
  <ellipse cx="107" cy="200" rx="38" ry="70" fill="#2D5A1B"/>
  <!-- Trees right -->
  <rect x="720" y="190" width="18" height="210" fill="#4A3728"/>
  <ellipse cx="729" cy="170" rx="45" ry="80" fill="#2D5A1B"/>
  <ellipse cx="729" cy="150" rx="35" ry="60" fill="#3A7023"/>
  <rect x="650" y="210" width="15" height="190" fill="#4A3728"/>
  <ellipse cx="657" cy="190" rx="38" ry="70" fill="#2D5A1B"/>
  <!-- Historic homes -->
  <!-- House 1 -->
  <rect x="150" y="280" width="140" height="120" fill="#F5F0E8"/>
  <polygon points="150,280 220,220 290,280" fill="#C8A882"/>
  <rect x="180" y="320" width="35" height="80" fill="#8B6914" opacity="0.8"/>
  <rect x="235" y="300" width="40" height="40" fill="#A8D4E8" opacity="0.7"/>
  <rect x="155" y="300" width="30" height="30" fill="#A8D4E8" opacity="0.7"/>
  <rect x="255" y="300" width="30" height="30" fill="#A8D4E8" opacity="0.7"/>
  <!-- Columns -->
  <rect x="160" y="260" width="8" height="80" fill="#E8E0D0"/>
  <rect x="175" y="260" width="8" height="80" fill="#E8E0D0"/>
  <!-- House 2 -->
  <rect x="440" y="260" width="160" height="140" fill="#EDE8DF"/>
  <polygon points="440,260 520,195 600,260" fill="#B89060"/>
  <rect x="475" y="310" width="40" height="90" fill="#7A5C10" opacity="0.8"/>
  <rect x="445" y="280" width="35" height="35" fill="#A8D4E8" opacity="0.7"/>
  <rect x="530" y="280" width="35" height="35" fill="#A8D4E8" opacity="0.7"/>
  <rect x="445" y="330" width="25" height="25" fill="#A8D4E8" opacity="0.7"/>
  <rect x="580" y="330" width="25" height="25" fill="#A8D4E8" opacity="0.7"/>
  <!-- Road -->
  <rect x="0" y="400" width="800" height="200" fill="#888"/>
  <rect x="0" y="395" width="800" height="12" fill="#6B8C3E"/>
  <!-- Road markings -->
  <rect x="100" y="460" width="80" height="6" fill="#FFF" opacity="0.6"/>
  <rect x="260" y="460" width="80" height="6" fill="#FFF" opacity="0.6"/>
  <rect x="420" y="460" width="80" height="6" fill="#FFF" opacity="0.6"/>
  <rect x="580" y="460" width="80" height="6" fill="#FFF" opacity="0.6"/>
  <!-- Sidewalk -->
  <rect x="0" y="395" width="800" height="15" fill="#C8C0B0"/>
  <!-- Overlay for card text readability -->
  <rect width="800" height="600" fill="rgba(10,25,50,0.35)"/>
</svg>

name: Rebuild blog and sitemap

# Runs automatically whenever a new/changed post appears under blog/,
# regenerates blog.html (static cards) and sitemap.xml, and commits them.
on:
  push:
    branches: [ main ]
    paths:
      - 'blog/**'        # only run when blog posts change
      - 'build_site.py'  # or when the build script itself changes

# Allow the Action to push its commit back to the repo
permissions:
  contents: write

# Prevent overlapping runs (e.g. two posts committed close together)
concurrency:
  group: rebuild-blog
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run build_site.py
        run: python build_site.py

      - name: Commit regenerated files (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog.html sitemap.xml
          if git diff --cached --quiet; then
            echo "No changes to blog.html or sitemap.xml — nothing to commit."
            exit 0
          fi
          git commit -m "Auto-rebuild blog cards + sitemap [skip ci]"
          # Make.com commits a post in two steps (html, then image), so two
          # Action runs can race. Retry the push, rebasing on the latest main
          # if the branch moved underneath us.
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Pushed successfully."
              exit 0
            fi
            echo "Push rejected (branch moved). Rebasing and retrying ($i)..."
            git pull --rebase --autostash origin main || true
            sleep 3
          done
          echo "Push still failing after retries."
          exit 1
